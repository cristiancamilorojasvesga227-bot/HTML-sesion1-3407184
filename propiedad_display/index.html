<!DOCTYPE html>
<html lang="en">
<head> 
    <style>
        .titulo{
            color:aqua;
            font-size:20xp;
            text-align: center;

        }
        .menu{
            display:inline ;
            color:aliceblue;
            background-color:black;
            width: 1000px;
            height:1000px;

        }

        .menu_block{
            display:block;
            color:blue;
            background-color:blueviolet;
            width: 400px;
            height: 200px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1 class="titulo">elementos inline</h1> 
    <div class="menu">productos</div>
        <div class="menu">servicios</div>
        <div class="menu">contacto</div> 
        <hr />
        <h1>elementos block</h1>
        <div class="menu_block">productos</div>
        <div class="menu_block">servicios</div>
        <div class="menu_block">contacto</div>
</body>
</html>
